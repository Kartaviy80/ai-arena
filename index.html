<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

*{

body{
font-family:'Inter',sans-serif;

.gradient-bg{

.blob{
position:absolute;
filter:blur(90px);

}

.blob-1{
width:500px;
height:500px;
background:rgba(59,130,246,.22);

left:-100px;
}

.blob-2{
width:500px;

@keyframes float{

50%{transform:translateY(40px)}

.glass{

backdrop-filter:blur(16px);

}

.model-card{

padding:32px;

}

.model-card:hover{

}

.logo{

}

.rank-bar{
height:10px;
border-radius:999px;
overflow:hidden;
background:rgba(255,255,255,.08);
}

.rank-fill{
height:100%;
background:linear-gradient(90deg,#3b82f6,#8b5cf6);
}

.mobile-scroll{
overflow-x:auto;
scrollbar-width:none;
}

.mobile-scroll::-webkit-scrollbar{
display:none;
}

@media(max-width:768px){
.vs{
font-size:40px;
}
.model-card{
padding:22px;
}
}

<div class="grid grid-cols-2 gap-4 w-full">
<div class="glass rounded-2xl p-4">

</div>

</div>

</div>

<div class="glass rounded-3xl p-6">

</div>

<div class="text-slate-400 text-sm mb-2">Всего баттлов</div>

</div>

<div class="glass rounded-3xl p-6">
<div class="text-slate-400 text-sm mb-2">Топ категория</div>

</div>

<div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 glass px-6 py-4 rounded-2xl z-[999]">
<span id="toastText"></span>
</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyDXV647tuR7adub0pO6PAGlFkivU5WY6T0",
authDomain:"aivs-93aaf.firebaseapp.com",
projectId:"aivs-93aaf",
storageBucket:"aivs-93aaf.firebasestorage.app",
messagingSenderId:"467176227726",
appId:"1:467176227726:web:ac1a26bba36838ae8fdadf"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const models=[
{
id:'gpt4',
name:'GPT-4 Turbo',
developer:'OpenAI',
category:'text',
logo:'https://placehold.co/200x200/10a37f/ffffff?text=GPT',
wins:145200,
elo:2890,
trend:'+12%'
},
{
id:'claude',
name:'Claude 3.5',
developer:'Anthropic',
category:'text',
logo:'https://placehold.co/200x200/d97706/ffffff?text=CL',
wins:121000,
elo:2810,
trend:'+9%'
},
{
id:'gemini',
name:'Gemini 1.5',
developer:'Google',
category:'text',
logo:'https://placehold.co/200x200/4285f4/ffffff?text=GE',
wins:108000,
elo:2750,
trend:'+8%'
},
{
id:'midjourney',
name:'Midjourney v6',
developer:'Midjourney',
category:'image',
logo:'https://placehold.co/200x200/7c3aed/ffffff?text=MJ',
wins:167000,
elo:3010,
trend:'+17%'
},
{
id:'copilot',
name:'GitHub Copilot',
developer:'GitHub',
category:'code',
logo:'https://placehold.co/200x200/111827/ffffff?text=CP',
wins:133000,
elo:2860,
trend:'+11%'
},
{
id:'cursor',
name:'Cursor AI',
developer:'Cursor',
category:'code',
logo:'https://placehold.co/200x200/000000/ffffff?text=CU',
wins:127000,
elo:2845,
trend:'+24%'
}
];

const questions=[
{
text:'Какая нейросеть лучше пишет код?',
category:'code'
},
{
text:'Какая нейросеть лучше отвечает на вопросы?',
category:'text'
},
{
text:'Какая нейросеть лучше генерирует изображения?',
category:'image'
}
];

let current={A:null,B:null};
let currentQuestion=null;
let totalVotesAll=0;
let totalVotesToday=0;

function toast(text){
const t=document.getElementById('toast');
document.getElementById('toastText').innerText=text;
t.classList.remove('hidden');
setTimeout(()=>t.classList.add('hidden'),2000);
}

async function initFirebase(){

const initialized=localStorage.getItem('arena_init');

if(initialized) return;

for(const model of models){
await db.collection('models').doc(model.id).set(model);
}

let total=0;
models.forEach(m=>total+=m.wins);

await db.collection('stats').doc('global').set({
totalVotes:total,
todayVotes:Math.floor(total*0.003)
});

localStorage.setItem('arena_init','true');
}

function calculateELO(winner,loser){

const K=32;

const expectedWinner=1/(1+Math.pow(10,(loser.elo-winner.elo)/400));
const expectedLoser=1/(1+Math.pow(10,(winner.elo-loser.elo)/400));

winner.elo=Math.round(winner.elo+K*(1-expectedWinner));
loser.elo=Math.round(loser.elo+K*(0-expectedLoser));
}

function antiSpamCheck(){

const lastVote=localStorage.getItem('last_vote');

if(!lastVote) return true;

const diff=Date.now()-Number(lastVote);

return diff>30000;
}

async function vote(side){

if(!antiSpamCheck()){
toast('Подождите 30 секунд');
return;
}

localStorage.setItem('last_vote',Date.now().toString());

const winner=side==='A'?current.A:current.B;
const loser=side==='A'?current.B:current.A;

winner.wins++;

calculateELO(winner,loser);

await db.collection('models').doc(winner.id).update({
wins:winner.wins,
elo:winner.elo
});

await db.collection('models').doc(loser.id).update({
elo:loser.elo
});

await db.collection('stats').doc('global').update({
totalVotes:firebase.firestore.FieldValue.increment(1),
todayVotes:firebase.firestore.FieldValue.increment(1)
});

loadBattle();
renderRating();
renderAnalytics();

toast('Голос засчитан');
}

function loadBattle(){

currentQuestion=questions[Math.floor(Math.random()*questions.length)];

const candidates=models.filter(m=>m.category===currentQuestion.category);

current.A=candidates[0];
current.B=candidates[1]||models[1];

questionTitle.innerText=currentQuestion.text;

nameA.innerText=current.A.name;
devA.innerText=current.A.developer;
logoA.src=current.A.logo;
eloA.innerText=current.A.elo;
winsA.innerText=current.A.wins.toLocaleString();

nameB.innerText=current.B.name;
devB.innerText=current.B.developer;
logoB.src=current.B.logo;
eloB.innerText=current.B.elo;
winsB.innerText=current.B.wins.toLocaleString();
}

function renderRating(){

const sorted=[...models].sort((a,b)=>b.elo-a.elo);

ratingContainer.innerHTML='';

const max=sorted[0].elo;

sorted.forEach((model,index)=>{

const percent=(model.elo/max)*100;

ratingContainer.innerHTML+=`
<div class="p-5 border-b border-white/5 flex flex-col md:flex-row md:items-center gap-4 justify-between hover:bg-white/5 transition">

<div class="flex items-center gap-4">
<div class="text-3xl font-black text-slate-500">
#${index+1}
</div>

<img src="${model.logo}" class="w-14 h-14 rounded-2xl">

<div>
<div class="font-bold text-xl">${model.name}</div>
<div class="text-sm text-slate-400">${model.developer}</div>
</div>
</div>

<div class="flex-1 max-w-md">
<div class="rank-bar">
<div class="rank-fill" style="width:${percent}%"></div>
</div>
</div>

<div class="text-right">
<div class="text-yellow-400 font-bold text-xl">ELO ${model.elo}</div>
<div class="text-green-400 text-sm">${model.trend}</div>
</div>

</div>
`;

});
}

function renderAnalytics(){

const best=[...models].sort((a,b)=>b.elo-a.elo)[0];
const trending=[...models].sort((a,b)=>parseInt(b.trend)-parseInt(a.trend))[0];

bestAI.innerText=best.name;
trendingAI.innerText=trending.name;
battleCount.innerText=totalVotesAll.toLocaleString();
bestCategory.innerText='Code AI';
}

function showTab(tab){

battleTab.classList.add('hidden');
ratingTab.classList.add('hidden');
analyticsTab.classList.add('hidden');

battleBtn.classList.remove('bg-blue-500/20','text-blue-400');
ratingBtn.classList.remove('bg-blue-500/20','text-blue-400');
analyticsBtn.classList.remove('bg-blue-500/20','text-blue-400');

if(tab==='battle'){
battleTab.classList.remove('hidden');
battleBtn.classList.add('bg-blue-500/20','text-blue-400');
}

if(tab==='rating'){
ratingTab.classList.remove('hidden');
ratingBtn.classList.add('bg-blue-500/20','text-blue-400');
}

if(tab==='analytics'){
analyticsTab.classList.remove('hidden');
analyticsBtn.classList.add('bg-blue-500/20','text-blue-400');
}
}

function startRealtime(){

setInterval(async()=>{

const random=models[Math.floor(Math.random()*models.length)];
random.wins+=Math.floor(Math.random()*3);

await db.collection('models').doc(random.id).update({
wins:random.wins
});

},15000);

}

function realtimeListeners(){

db.collection('models').onSnapshot(snapshot=>{

snapshot.forEach(doc=>{

const data=doc.data();
const local=models.find(m=>m.id===doc.id);

if(local){
local.wins=data.wins;
local.elo=data.elo;
}

});

renderRating();
loadBattle();
renderAnalytics();

});



db.collection('stats').doc('global').onSnapshot(doc=>{

if(!doc.exists) return;

const data=doc.data();

totalVotesAll=data.totalVotes;
totalVotesToday=data.todayVotes;


document.getElementById('totalVotes').innerText=totalVotesAll.toLocaleString();
document.getElementById('todayVotes').innerText=totalVotesToday.toLocaleString();

});
}

function fakeOnline(){
setInterval(()=>{
const online=Math.floor(Math.random()*400)+120;
document.getElementById('onlineUsers').innerText=online;
},3000);
}

window.addEventListener('DOMContentLoaded',async()=>{

await initFirebase();

loadBattle();
renderRating();
renderAnalytics();
realtimeListeners();
startRealtime();
fakeOnline();

});

</script>

</body>
</html>
