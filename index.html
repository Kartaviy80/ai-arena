            { name: "Continue", cat: "code", desc: "Open-source плагин", link: "https://continue.dev", affLink: "https://continue.dev" },
            // Голос/Музыка (8)
            { name: "Suno AI", cat: "voice", desc: "Генерация музыки", link: "https://suno.ai", affLink: "https://suno.ai" },
            { name: "ElevenLabs", cat: "voice", desc: "Озвучка голосом", link: "https://elevenlabs.io", affLink: "https://elevenlabs.io" },
            { name: "Udio", cat: "voice", desc: "Музыка по описанию", link: "https://udio.com", affLink: "https://udio.com" },
            { name: "Stable Audio", cat: "voice", desc: "От Stability AI", link: "https://stableaudio.com", affLink: "https://stableaudio.com" },
            { name: "Murf AI", cat: "voice", desc: "Голос для видео", link: "https://murf.ai", affLink: "https://murf.ai" },
            { name: "Resemble AI", cat: "voice", desc: "Клонирование голоса", link: "https://resemble.ai", affLink: "https://resemble.ai" },
            { name: "Play.ht", cat: "voice", desc: "AI озвучка", link: "https://play.ht", affLink: "https://play.ht" },
            { name: "Riffusion", cat: "voice", desc: "Музыка из текста", link: "https://riffusion.com", affLink: "https://riffusion.com" }
        ];

        let votes = { left: 0, right: 0 };
        let battlesCount = 0;
        
        function loadStats() {
            const savedVotes = localStorage.getItem('ai_arena_votes');
            if (savedVotes) { try { const v = JSON.parse(savedVotes); votes = v; document.getElementById('votesLeft').innerText = votes.left || 0; document.getElementById('votesRight').innerText = votes.right || 0; } catch(e) {} }
            const savedBattles = localStorage.getItem('ai_arena_battles');
            if (savedBattles) { battlesCount = parseInt(savedBattles) || 0; document.getElementById('battleCount').innerText = battlesCount; }
        }
        
        function saveStats() { localStorage.setItem('ai_arena_votes', JSON.stringify(votes)); localStorage.setItem('ai_arena_battles', battlesCount.toString()); }
        
        function vote(side) {
            if (side === 'left') { votes.left++; document.getElementById('votesLeft').innerText = votes.left; }
            else { votes.right++; document.getElementById('votesRight').innerText = votes.right; }
            saveStats();
            const btn = event.currentTarget;
            btn.innerHTML = '<i class="fas fa-check"></i> Голос учтён';
            setTimeout(() => btn.innerHTML = '<i class="fas fa-thumbs-up mr-1"></i> Голос', 2000);
        }
        
        function setQuestion(text) { document.getElementById('questionInput').value = text; startBattle(); }
        
        async function fetchAI(model, prompt, targetId, timeId) {
            const resultDiv = document.getElementById(targetId);
            const timeSpan = document.getElementById(timeId);
            const start = Date.now();
            resultDiv.innerHTML = '<div class="loading-pulse"><div class="h-4 bg-white/10 rounded w-full mb-2"></div><div class="h-4 bg-white/10 rounded w-3/4"></div><div class="h-4 bg-white/10 rounded w-1/2"></div></div>';
            try {
                const response = await fetch('/api/proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: model, messages: [{ role: 'user', content: prompt }] })
                });
                const data = await response.json();
                const elapsed = Date.now() - start;
                timeSpan.innerText = `${elapsed}ms`;
                if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
                const answer = data.choices[0].message.content;
                resultDiv.innerHTML = `<div class="response-content fade-in">${marked.parse(answer)}</div>`;
            } catch (error) {
                resultDiv.innerHTML = `<div class="text-red-400 text-sm p-3 bg-red-500/10 rounded-xl">❌ Ошибка: ${error.message}<br><span class="text-xs opacity-70">Проверьте консоль (F12)</span></div>`;
                timeSpan.innerText = 'err';
            }
        }
        
        async function startBattle() {
            const question = document.getElementById('questionInput').value.trim();
            if (!question) { alert('Введите вопрос!'); return; }
            const btn = document.getElementById('battleBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i> БИТВА...';
            battlesCount++;
            document.getElementById('battleCount').innerText = battlesCount;
            saveStats();
            const modelLeft = document.getElementById('modelLeft').value;
            const modelRight = document.getElementById('modelRight').value;
            await Promise.all([fetchAI(modelLeft, question, 'resultLeft', 'timeLeft'), fetchAI(modelRight, question, 'resultRight', 'timeRight')]);
            btn.disabled = false;
            btn.innerHTML = '<span>БАТТЛ</span><i class="fas fa-bolt"></i>';
        }
        
        function toggleCatalog() { 
            const modal = document.getElementById('catalogModal'); 
            modal.classList.toggle('hidden'); 
            if (!modal.classList.contains('hidden')) renderCatalog('all'); 
        }
        
        function renderCatalog(cat) {
            const grid = document.getElementById('catalogGrid');
            const filtered = cat === 'all' ? aiDatabase : aiDatabase.filter(ai => ai.cat === cat);
            grid.innerHTML = filtered.map(ai => `
                <div class="glass-card rounded-xl p-4 hover:scale-[1.02] transition-all fade-in card-slide">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-lg text-white">${ai.name}</h3>
                        <span class="text-xs px-2 py-1 rounded-full bg-white/10">${getCatIcon(ai.cat)}</span>
                    </div>
                    <p class="text-sm text-slate-300 mb-3">${ai.desc}</p>
                    <div class="flex gap-2">
                        <a href="${ai.affLink}" target="_blank" class="flex-1 text-center text-sm py-2 rounded-lg bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white transition-all">🚀 Открыть</a>
                        <a href="${ai.link}" target="_blank" class="text-sm py-2 px-3 rounded-lg bg-white/5 hover:bg-white/10 transition-all"><i class="fas fa-external-link-alt"></i></a>
                    </div>
                </div>
            `).join('');
        }
        
        function getCatIcon(cat) { const icons = { text: '💬', image: '🎨', video: '🎬', code: '💻', voice: '🎤' }; return icons[cat] || '🤖'; }
        
        function filterCatalog(cat) {
            renderCatalog(cat);
            document.querySelectorAll('.category-btn').forEach(btn => { btn.classList.remove('active'); if (btn.getAttribute('data-cat') === cat) btn.classList.add('active'); });
        }
        
        loadStats();
        document.getElementById('questionInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') startBattle(); });
        
        const style = document.createElement('style');
        style.textContent = `.category-btn.active { background: rgba(59,130,246,0.25); color: #3b82f6; border-left: 3px solid #3b82f6; }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
